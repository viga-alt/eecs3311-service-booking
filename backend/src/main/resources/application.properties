server.port=8080

# Gemini AI Configuration (stable model ID — not the dated preview name)
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# MySQL (available for future persistence integration)
spring.datasource.url=jdbc:mysql://db:3306/booking_platform?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=rootpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
